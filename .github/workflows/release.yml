name: Release on version bump

# When pyproject.toml's version on main is newer than the latest git tag, this
# workflow runs lint/test/build, publishes the wheel + sdist to PyPI via
# Trusted Publishing, and then pushes a v<version> tag pointing at the release
# commit. Tag-after-publish ensures a failed publish is retryable without
# manually deleting a tag pointing at an unpublished version.

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

permissions:
  contents: write    # to push the v<version> tag
  id-token: write    # for PyPI Trusted Publishing (OIDC)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Read package version
        id: pkg
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: steps.check.outputs.skip != 'true'
        run: |
          uv sync --dev
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        if: steps.check.outputs.skip != 'true'
        run: uv run pytest tests/ -v

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: uv build --no-sources

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Tag release
        if: steps.check.outputs.skip != 'true'
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
