name: Auto-tag on Fern release

# When Fern merges a regeneration PR into main, pyproject.toml's version is
# bumped but no git tag is pushed — so any tag-gated publish step in CI never
# fires. This workflow reads the package version, creates a v<version> tag if
# missing, and pushes it. The tag push then triggers the publish path.

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

permissions:
  contents: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: pkg
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Tag if missing
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed $TAG"
